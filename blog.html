<!doctype html>
<html lang="en">
    <head>
        <title>blog — eloise rgb-b</title>
        <meta charset="UTF-8" />
        <meta

            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <meta name="description" content="blog" />
        <meta name="author" content="el" />
        <link rel="stylesheet" href="style.css" />
        <script>
            (function () {
                let title = "blog ✦ eloise rgb-b ✦ ";
                let position = 0;
                function scrollTitle() {
                    document.title =
                        title.substring(position) +
                        title.substring(0, position);
                    position++;
                    if (position > title.length) position = 0;
                    window.setTimeout(scrollTitle, 170);
                }
                scrollTitle();
            })();
        </script>
    </head>
    <body>
        <!-- Fixed header (shared) -->
        <header>

            <nav>
                <ul>
                    <li><a href="index.html">home</a></li>
                    <li><a href="blog.html" class="active">blog</a></li>
                    <!-- add more nav links here -->
                </ul>
            </nav>
        </header>

        <main>
            <a class="back-link" href="index.html">&larr; back home</a>

            <div class="blog-layout">
                <!-- Main blog content -->
                <div class="blog-content">
                    <section style="margin-bottom: var(--spacing-md)">

                    <!-- Blog post entries — copy this block to add more posts -->
                    <div class="blog-post-card">

                        <a class="read-more" href="post-march-01.html"
                            >read more &rarr;</a
                        >

                    <!-- end blog posts -->

                <!-- Sidebar -->

                            work.

                    </div>

                <!-- end sidebar -->

        <footer>
            <p>
                eloise &mdash;
                <a href="mailto:eloise@rgb-b.com">eloise@rgb-b.com</a> &mdash;
                2026
            </p>
        </footer>

        <script>
            // Staggered fade-in for blog post cards
            document.addEventListener("DOMContentLoaded", function () {
                const cards = document.querySelectorAll(".blog-post-card");
                cards.forEach(function (card, i) {
                    card.style.opacity = "0";
                    card.style.animation =
                        "fadeIn 0.4s ease forwards " + i * 80 + "ms";
                });
            });
        </script>
    </body>
